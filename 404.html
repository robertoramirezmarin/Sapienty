<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redireccionando...</title>
    <script>
        // --- CONFIGURA TUS LINKS AQUÍ ---
        const links = {
            "zoom": "https://us02web.zoom.us/j/5551861025?pwd=MXhOdUJQeDlMVDFPL2w5ZnN0enhnQT09#success",
            "github": "https://github.com/robertoramirezmarin",
        };

        // Obtener la palabra después de /Sapienty/
        const path = window.location.pathname.split('/').pop().toLowerCase();

        // Si el link existe en nuestra lista, redirigir
        if (links[path]) {
            window.location.href = links[path];
        } else {
            // Si no existe, mandarlo a la página principal
            window.location.href = "https://robertoramirezmarin.github.io/Sapienty/";
        }
    </script>
</head>

</body>
